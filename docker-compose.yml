services:
  postgres:
    image: postgres:17-alpine
    container_name: jobtrack_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobtrack
    ports:
      - "5434:5432"
    volumes:
      - jobtrack_postgres_data:/var/lib/postgresql/data
    networks:
      - jobtrack_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobtrack"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: jobtrack_backend
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: development
      PORT: 3333
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/jobtrack
      FRONTEND_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-local-dev-google-client-id.apps.googleusercontent.com}
      JWT_SECRET: dev-secret-change-in-production
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - jobtrack_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: jobtrack_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3333
      NEXT_PUBLIC_ENABLE_MSW: "false"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.ts:/app/next.config.ts
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - jobtrack_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

networks:
  jobtrack_network:
    name: jobtrack_network
    driver: bridge

volumes:
  jobtrack_postgres_data:
    name: jobtrack_postgres_data
  backend_node_modules:
    name: jobtrack_backend_node_modules
  frontend_node_modules:
    name: jobtrack_frontend_node_modules
  frontend_next:
    name: jobtrack_frontend_next
